[project]
name = "thesis-benchmarks"
version = "2.1.0"
description = "Full Workflow GIS Benchmark Suite (Bleeding Edge 2025)"
authors = ["A2RK"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
# --- CORE ENGINES (Latest Stable) ---
python = "3.13.*"        # Latest Python
numpy = "*"              # Will fetch Numpy 2.x if available/compatible
hyperfine = "*"

# --- DATA PREP ---
scipy = "*"
zarr = "*"
rioxarray = "*"

# --- PYTHON STACK ---
# Using '*' allows Pixi to solve for the absolute latest version
# available on conda-forge right now.
pandas = "*"
geopandas = "*"
rasterio = "*"
shapely = "*"
xarray = "*"
dask = "*"
scikit-learn = "*"

# --- R STACK ---
r-base = "4.5.*"         # Latest R
r-sf = "*"
r-terra = "*"
r-stars = "*"
r-class = "*"
r-rmatio = "*"
r-dplyr = "*"

# --- JULIA ---
julia = "1.12.*"         # Latest Stable Julia

# --- LINUX SPECIFIC ---
[target.linux-64.dependencies]
libgdal = "*"
compilers = "*"

# --- WINDOWS SPECIFIC ---
[target.win-64.dependencies]
libgdal = "*"
m2w64-toolchain = "*"    # Required to compile R packages on Windows

[tasks]
# 1. SETUP
prepare = "python tools/download_data.py"

# 2. WARMUP
# Windows-safe quoting used here to prevent CLI errors
warmup = "python -c \"import shapely; print('Py Ready')\""

# 3. BENCHMARKS
bench-vector = """
hyperfine --warmup 1 --min-runs 3 --export-json results_vector.json \
  -n "Py_Vector" "python benchmarks/bench_vector.py" \
  -n "R_Vector"  "Rscript benchmarks/bench_vector.R" \
  -n "Jl_Vector" "julia --project=. benchmarks/bench_vector.jl"
"""

bench-raster = """
hyperfine --warmup 1 --min-runs 3 --export-json results_raster.json \
  -n "Py_Raster" "python benchmarks/bench_raster.py" \
  -n "R_Raster"  "Rscript benchmarks/bench_raster.R" \
  -n "Jl_Raster" "julia --project=. benchmarks/bench_raster.jl"
"""

bench-hsi = """
hyperfine --warmup 1 --min-runs 3 --export-json results_hsi.json \
  -n "Py_HSI" "python benchmarks/bench_hsi.py" \
  -n "R_HSI"  "Rscript benchmarks/bench_hsi.R" \
  -n "Jl_HSI" "julia --project=. benchmarks/bench_hsi.jl"
"""

bench-knn = """
hyperfine --warmup 1 --min-runs 3 --export-json results_knn.json \
  -n "Py_KNN" "python benchmarks/bench_knn.py" \
  -n "R_KNN"  "Rscript benchmarks/bench_knn.R" \
  -n "Jl_KNN" "julia --project=. benchmarks/bench_knn.jl"
"""

# MASTER COMMAND
run-all = { depends-on = ["prepare", "warmup", "bench-vector", "bench-raster", "bench-hsi", "bench-knn"] }
