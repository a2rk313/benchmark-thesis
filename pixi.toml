[workspace]
name = "gis-benchmarks"
version = "1.0.0"
description = "Scientific GIS Benchmark Suite (RHEL 10 Enterprise Standard)"
authors = ["Admin"]
channels = ["conda-forge"]
# STRICT PLATFORM: Linux Only
platforms = ["linux-64"]

[tasks]
# FIX: Syntax updated to "depends-on"
prepare = "mkdir -p data results"
warmup = { cmd = "julia --project=. -e 'using Pkg; Pkg.precompile()'", depends-on = ["prepare"] }

# --- CRITICAL FIX: MATCH FILENAMES FROM SCREENSHOT ---
# Changed "benchmark_vector.jl" -> "bench_vector.jl", etc.
bench-vector = { cmd = "julia --project=. src/bench_vector.jl", depends-on = ["warmup"] }
bench-raster = { cmd = "julia --project=. src/bench_raster.jl", depends-on = ["warmup"] }
bench-hsi = { cmd = "python src/bench_hsi.py", depends-on = ["warmup"] }
bench-knn = { cmd = "python src/bench_knn.py", depends-on = ["warmup"] }
# -----------------------------------------------------

run-all = { depends-on = ["prepare", "warmup", "bench-vector", "bench-raster", "bench-hsi", "bench-knn"] }

[dependencies]
# --- CORE LANGUAGES ---
python = "*"
julia = "*"

# --- PYTHON GIS STACK ---
gdal = "*"
rasterio = "*"
shapely = "*"
geopandas = "*"
numpy = "*"
pandas = "*"
scipy = "*"
scikit-learn = "*"
xarray = "*"
dask = "*"
zarr = "*"
duckdb = "*"
pyarrow = "*"

# --- R GIS STACK ---
r-base = "*"
r-sf = "*"
r-terra = "*"
r-stars = "*"
r-arrow = "*"
"r-data.table" = "*"
r-dplyr = "*"
