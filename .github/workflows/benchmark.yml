name: Cloud Benchmark

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. FREE DISK SPACE (Manual Cleanup)
      # Necessary because your GIS container is larger than the default runner space.
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      # 2. PULL IMAGE
      - name: Pull Docker Image
        run: docker pull ghcr.io/${{ github.repository }}:latest

      # 3. RUN BENCHMARK (Direct Mounts)
      # We mount your actual 'benchmarks' and 'tools' folders directly into the container.
      # We also mount a 'results' folder to save the output.
      - name: Run Suite
        run: |
          mkdir -p results
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}/benchmarks:/opt/gis-benchmarks/benchmarks \
            -v ${{ github.workspace }}/tools:/opt/gis-benchmarks/tools \
            -v ${{ github.workspace }}/results:/opt/gis-benchmarks/results \
            ghcr.io/${{ github.repository }}:latest \
            /bin/bash -c "pixi run run-all"

      # 4. UPLOAD
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results/*.json
