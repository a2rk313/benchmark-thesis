name: Cloud Benchmark
on:
  push:
    branches: ['main']
  workflow_run:
    workflows: ["Build OS Image"]
    types: [completed]
jobs:
  benchmark:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Sync Code
        run: cp -r benchmarks tools /opt/gis-benchmarks/
      - name: Run Suite
        working-directory: /opt/gis-benchmarks
        run: pixi run run-all
      - name: Upload Data
        uses: actions/upload-artifact@v4
        with: {name: results, path: /opt/gis-benchmarks/final_results.csv}
