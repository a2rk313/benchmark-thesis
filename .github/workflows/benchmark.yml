name: Cloud Benchmark

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    container:
      # This pulls the OS image built by your build.yml workflow
      # Note: On a fresh push, this might pull the previous image if the build job hasn't finished yet.
      image: ghcr.io/${{ github.repository }}:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Prep Directories
        run: |
          mkdir -p results
          # Copy scripts from repo to /opt location
          cp -r benchmarks tools /opt/gis-benchmarks/

      - name: Run Suite
        working-directory: /opt/gis-benchmarks
        run: pixi run run-all

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            /opt/gis-benchmarks/*.json
            /opt/gis-benchmarks/results/*
