name: Cloud Benchmark

on:
  workflow_dispatch: # Allows you to manually trigger the benchmark button
  push:
    branches: [ "main" ] # Optional: Runs on every push (disable if too expensive)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  run-benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- CRITICAL FIX: FREE DISK SPACE ---
      # The runner needs extra space to download (pull) your large OS image.
      # We manually delete unused tools to reclaim ~25GB.
      - name: Free Disk Space (Manual)
        run: |
          echo "Free space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "Free space after cleanup:"
          df -h

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker Image
        run: |
          echo "Pulling image..."
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run GIS Benchmarks
        run: |
          echo "Starting Benchmark Suite..."
          # We run the container using the default CMD (pixi run run-all)
          # --rm removes the container after it finishes to save space
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
