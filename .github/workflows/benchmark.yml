name: Cloud Benchmark
on:
  push:
    branches: ['main']
  workflow_run:
    workflows: ["Build OS Image"]
    types: [completed]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    container:
      # ⚠️ CRITICAL: Replace 'your_username' and 'gis-benchmarks'
      # with your actual lowercase GitHub username and repo name.
      # GitHub Actions CANNOT read variables here. You MUST hardcode it.
      image: ghcr.io/a2rk313/benchmark-thesis:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Sync Code
        run: cp -r benchmarks tools /opt/gis-benchmarks/
      - name: Run Suite
        working-directory: /opt/gis-benchmarks
        run: pixi run run-all
      - name: Upload Data
        uses: actions/upload-artifact@v4
        with: {name: results, path: /opt/gis-benchmarks/final_results.csv}
