name: Cloud Benchmark

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    # Grant permission to read the package
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      # 1. FREE DISK SPACE
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      # 2. LOGIN TO REGISTRY (Fixes "unauthorized" error)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. PULL IMAGE
      - name: Pull Docker Image
        run: docker pull ghcr.io/${{ github.repository }}:latest

      # 4. RUN BENCHMARK
      - name: Run Suite
        run: |
          mkdir -p results
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}/benchmarks:/opt/gis-benchmarks/benchmarks \
            -v ${{ github.workspace }}/tools:/opt/gis-benchmarks/tools \
            -v ${{ github.workspace }}/results:/opt/gis-benchmarks/results \
            ghcr.io/${{ github.repository }}:latest \
            /bin/bash -c "pixi run run-all"

      # 5. UPLOAD
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results/*.json
