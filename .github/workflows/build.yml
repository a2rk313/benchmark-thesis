name: Build and Push Thesis Containers

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # allow manual trigger

env:
  REGISTRY: ghcr.io
  # Replace with your GitHub username in lowercase
  IMAGE_OWNER: ${{ github.repository_owner }}
  PYTHON_TAG: thesis-python:3.14
  JULIA_TAG: thesis-julia:1.11
  R_TAG: thesis-r:4.5

jobs:
  build-containers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up Docker Buildx (for advanced features like caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------- Build Python container ----------
      - name: Build and push Python image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/python.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.PYTHON_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- Build Julia container ----------
      - name: Build and push Julia image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/julia.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.JULIA_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- Build R container ----------
      - name: Build and push R image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/r.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.R_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- (Optional) Quick verification ----------
      - name: Verify Python container
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.PYTHON_TAG }} \
            python3 -c "import numpy; print(numpy.__version__)"

      - name: Verify Julia container
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.JULIA_TAG }} \
            julia -e 'using ArchGDAL; println("OK")'

      - name: Verify R container
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.R_TAG }} \
            Rscript -e 'library(terra); cat("OK\n")'

      # ---------- Save digests as artifact ----------
      - name: Save container digests
        run: |
          echo "Python: $(docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.PYTHON_TAG }} --format='{{.Id}}')" > digests.txt
          echo "Julia:  $(docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.JULIA_TAG }} --format='{{.Id}}')" >> digests.txt
          echo "R:      $(docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.R_TAG }} --format='{{.Id}}')" >> digests.txt

      - name: Upload digests
        uses: actions/upload-artifact@v4
        with:
          name: container-digests
          path: digests.txt
