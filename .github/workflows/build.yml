name: Build and Push Thesis Containers

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'containers/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===========================================================================
  # Build Ultra-Optimized Containers (Debian-based slim images)
  # Size: ~500MB-1GB each (down from 2-3GB)
  # Build time: ~10-20 min total (down from ~45 min)
  # ===========================================================================
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: python
            file: containers/python-optimized.Containerfile
            tag: thesis-python:fedora
            verify: "python3 --version"
          - name: julia
            file: containers/julia-optimized.Containerfile
            tag: thesis-julia:fedora
            verify: "julia --version"
          - name: r
            file: containers/r-optimized.Containerfile
            tag: thesis-r:fedora
            verify: "R --version --quiet"

    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker image prune -af
          sudo rm -rf /usr/share/miniconda /opt/hostedtoolcache/CodeQL
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify ${{ matrix.name }} container
        run: |
          echo "Verifying ${{ matrix.name }}..."
          docker run --rm ghcr.io/${{ github.repository_owner }}/${{ matrix.tag }} ${{ matrix.verify }}

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    runs-on: ubuntu-latest
    needs: build-base
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Container Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Language | Base Image | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python | python:3.13-slim-bookworm | 3.13.12 |" >> $GITHUB_STEP_SUMMARY
          echo "| Julia | julia:1.11-bookworm | 1.11.9 |" >> $GITHUB_STEP_SUMMARY
          echo "| R | r-base:4.5.3 | 4.5.3 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Size reduction**: ~60-80% (from 2-3GB to ~500MB-1GB)" >> $GITHUB_STEP_SUMMARY
          echo "**Build time**: ~10-20 min (from ~45 min)" >> $GITHUB_STEP_SUMMARY
