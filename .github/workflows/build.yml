name: Build and Push Thesis Containers

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'containers/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ===========================================================================
  # Build Fedora Containers (for local use)
  # ===========================================================================
  build-fedora:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Python (Fedora)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/python.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:fedora
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:3.13
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Julia (Fedora)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/julia.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:fedora
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:1.11
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push R (Fedora)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/r.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:fedora
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:4.5
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Build Ubuntu Containers (for GitHub Codespaces)
  # ===========================================================================
  build-ubuntu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Python (Ubuntu)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/python-ubuntu.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:ubuntu
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:codespaces
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Julia (Ubuntu)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/julia-ubuntu.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:ubuntu
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:codespaces
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push R (Ubuntu)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/r-ubuntu.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:ubuntu
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:codespaces
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Build Optimized Containers (50-60% smaller)
  # ===========================================================================
  build-optimized:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Python Optimized
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/python-optimized.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:optimized
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Julia Optimized
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/julia-optimized.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:optimized
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push R Optimized
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/r-optimized.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:optimized
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Build Slim Containers (most aggressive optimization)
  # ===========================================================================
  build-slim:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Python Slim
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/python-slim.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:slim
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Julia Slim
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/julia-slim.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:slim
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push R Slim
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/r-slim.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:slim
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Verification
  # ===========================================================================
  verify:
    runs-on: ubuntu-latest
    needs: [build-fedora, build-ubuntu, build-optimized, build-slim]
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and verify Fedora containers
        run: |
          echo "=== Verifying Fedora Containers ==="
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:fedora python3 -c "import numpy; print('Python (Fedora): OK')"
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:fedora julia -e 'using Pkg; println("Julia (Fedora): OK")'
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:fedora Rscript -e 'cat("R (Fedora): OK\n")'

      - name: Pull and verify Ubuntu containers
        run: |
          echo "=== Verifying Ubuntu Containers ==="
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:ubuntu python3 -c "import numpy; print('Python (Ubuntu): OK')"
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:ubuntu julia -e 'using Pkg; println("Julia (Ubuntu): OK")'
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:ubuntu Rscript -e 'cat("R (Ubuntu): OK\n")'
