name: Build and Push Thesis Containers

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'containers/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  # Force Node.js 24 for GitHub Actions (Node.js 20 deprecated June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===========================================================================
  # Build Base Containers (Fedora 43) - Parallel Matrix
  # ===========================================================================
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: python
            file: containers/python.Containerfile
            tags: |
              ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:fedora
              ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:3.13
          - name: julia
            file: containers/julia.Containerfile
            tags: |
              ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:fedora
              ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:1.11
          - name: r
            file: containers/r.Containerfile
            tags: |
              ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:fedora
              ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:4.5

    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker image prune -af
          sudo rm -rf /usr/share/miniconda /opt/hostedtoolcache/CodeQL
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ matrix.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Verification
  # ===========================================================================
  verify:
    runs-on: ubuntu-latest
    needs: build-base
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and verify containers
        run: |
          echo "=== Verifying Containers ==="
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:fedora python3 --version
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:fedora julia --version
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:fedora R --version --quiet
          echo "=== All containers verified ==="
