name: Build and Push OS Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Use the GitHub Container Registry
  REGISTRY: ghcr.io
  # Use the repository name (e.g., your-user/gis-benchmarks) automatically
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- CRITICAL FIX: FREE UP DISK SPACE ---
      # This deletes pre-installed tools (Android, .NET, etc.)
      # to give your build ~40GB of space instead of 14GB.
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space-action@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          # This automatically tags the image as "latest"
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Optimization: Cache layers to make future builds faster
          cache-from: type=gha
          cache-to: type=gha,mode=max
