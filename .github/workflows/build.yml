name: Build and Push Thesis Containers

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - 'containers/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ===========================================================================
  # Build Base Containers
  # ===========================================================================
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Python
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/python.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:3.13
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Julia
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/julia.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:1.11
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push R
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/r.Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:4.5
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Build Optimized Containers (50-60% smaller)
  # ===========================================================================
  build-optimized:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Python Optimized
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/python-optimized.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:optimized
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Julia Optimized
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/julia-optimized.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:optimized
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push R Optimized
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/r-optimized.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:optimized
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Build Slim Containers (most aggressive optimization)
  # ===========================================================================
  build-slim:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Python Slim
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/python-slim.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:slim
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Julia Slim
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/julia-slim.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:slim
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push R Slim
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/r-slim.Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:slim
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Verification
  # ===========================================================================
  verify:
    runs-on: ubuntu-latest
    needs: [build-base, build-optimized, build-slim]
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and verify all containers
        run: |
          echo "=== Verifying Base Containers ==="
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:3.13 python3 -c "import numpy; print('Python: OK')"
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:1.11 julia -e 'using ArchGDAL; println("Julia: OK")'
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:4.5 Rscript -e 'library(terra); cat("R: OK\n")'

          echo "=== Verifying Slim Containers ==="
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-python:slim python3 -c "import numpy; print('Python-slim: OK')"
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-julia:slim julia -e 'using ArchGDAL; println("Julia-slim: OK")'
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-r:slim Rscript -e 'library(terra); cat("R-slim: OK\n")'

      - name: Get container sizes
        run: |
          echo "=== Container Sizes ==="
          for img in python:3.13 julia:1.11 r:4.5 python:slim julia:slim r:slim python:optimized julia:optimized r:optimized; do
            size=$(docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/thesis-$img 2>/dev/null | grep -oP '\d+\.\d+ MB' | tail -1 || echo "N/A")
            echo "$img: $size"
          done
