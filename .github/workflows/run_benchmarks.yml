name: Run Benchmarks

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push Thesis Containers"]
    types: [completed]

jobs:
  run-benchmarks:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read
      actions: read

    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker image prune -af
          sudo rm -rf /usr/share/miniconda /opt/hostedtoolcache/CodeQL
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y podman hyperfine

      - name: Pull pre-built containers
        run: |
          echo "Pulling pre-built containers from GHCR using podman..."
          podman pull ghcr.io/${{ github.repository_owner }}/thesis-python:latest || true
          podman pull ghcr.io/${{ github.repository_owner }}/thesis-julia:latest || true
          podman pull ghcr.io/${{ github.repository_owner }}/thesis-r:latest || true

      - name: Verify containers
        run: |
          echo "Verifying containers..."
          podman images | grep thesis || echo "No thesis containers found locally"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.4'

      - name: Install Python dependencies
        run: |
          pip install numpy scipy pandas geopandas rasterio shapely scikit-learn matplotlib seaborn json3 tqdm h5py

      - name: Prepare benchmark datasets
        run: |
          # Download/generate all benchmark datasets
          python3 tools/download_data.py --all --synthetic
          echo "=== Data files ==="
          ls -lh data/ 2>/dev/null | head -15

      - name: Run benchmarks (native + container)
        run: |
          # Run full suite: native + container benchmarks
          # Containers are pre-built and tagged, so script won't rebuild
          ./run_benchmarks.sh

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results/

      - name: Upload validation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: validation/
