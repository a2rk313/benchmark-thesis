name: Run Benchmarks

on:
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: 'Baseline commit/branch for comparison'
        required: false
        default: ''
  workflow_run:
    workflows: ["Build and Push Thesis Containers"]
    types: [completed]

jobs:
  benchmark-native:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read
      actions: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/share/miniconda /opt/hostedtoolcache/CodeQL
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Cache data downloads
        id: cache-data
        uses: actions/cache@v4
        with:
          path: data/
          key: benchmark-data-${{ hashFiles('tools/download_data.py', 'data/dataset_manifest.json') }}
          restore-keys: |
            benchmark-data-

      - name: Prepare data directory
        run: mkdir -p data results

      - name: Prepare benchmark datasets
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: |
          python3 tools/download_data.py --all --synthetic || true

      - name: Install mise
        uses: jdxorg/actions-mise@v1

      - name: Setup dependencies with mise
        run: |
          mise install
          mise run setup || true

      - name: Run Python benchmarks
        run: mise run bench-python

      - name: Run Julia benchmarks
        if: success() || failure()
        run: mise run bench-julia || echo "Julia not available"

      - name: Run R benchmarks
        if: success() || failure()
        run: mise run bench-r || echo "R not available"

      - name: Detect flaky benchmarks
        run: |
          python3 benchmarks/detect_flaky.py results/ || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-native
          path: |
            results/*.json
            results/**/*.json
            validation/*.json
            validation/**/*.json

  benchmark-container:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read
      actions: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/share/miniconda /opt/hostedtoolcache/CodeQL

      - name: Cache data downloads
        id: cache-data
        uses: actions/cache@v4
        with:
          path: data/
          key: benchmark-data-${{ hashFiles('tools/download_data.py', 'data/dataset_manifest.json') }}
          restore-keys: |
            benchmark-data-

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull containers
        run: |
          podman pull ghcr.io/${{ github.repository_owner }}/thesis-python:latest || true
          podman pull ghcr.io/${{ github.repository_owner }}/thesis-julia:latest || true
          podman pull ghcr.io/${{ github.repository_owner }}/thesis-r:latest || true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y podman hyperfine time

      - name: Prepare data directory
        run: mkdir -p data results

      - name: Prepare benchmark datasets
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: |
          python3 tools/download_data.py --all --synthetic || true

      - name: Run benchmarks in containers
        run: ./run_benchmarks.sh --container-only --use-ghcr  # Force GHCR pull in CI

      - name: Upload container results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-container
          path: |
            results/*.json
            results/**/*.json
            validation/*.json
            validation/**/*.json

  compare-to-baseline:
    needs: [benchmark-native, benchmark-container]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.baseline_ref != '' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download current results
        uses: actions/download-artifact@v4
        with:
          path: current-results
          merge-multiple: true

      - name: Checkout baseline
        run: |
          git worktree add baseline-workspace ${{ github.event.inputs.baseline_ref }}

      - name: Download baseline artifacts
        uses: actions/download-artifact@v4
        with:
          name: baseline-results
          path: baseline-results

      - name: Run benchmark diffing
        run: |
          python3 benchmarks/benchmark_diff.py current-results/ baseline-results/ --output=diff_report.md

      - name: Upload diff report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-diff-report
          path: diff_report.md

  flaky-detection-analysis:
    needs: [benchmark-native, benchmark-container]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          merge-multiple: true

      - name: Analyze for flaky tests
        run: |
          python3 benchmarks/detect_flaky.py all-results/ --analyze --output=flaky_report.json

      - name: Upload flaky analysis
        uses: actions/upload-artifact@v4
        with:
          name: flaky-analysis
          path: flaky_report.json
