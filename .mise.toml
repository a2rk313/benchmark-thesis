# =============================================================================
# .mise.toml - Cross-Platform Benchmark Environment Configuration
# =============================================================================
# This configuration is designed for NATIVE (non-container) execution.
# For container-based execution, use run_benchmarks.sh instead.
#
# CANONICAL VERSIONS (aligned with benchmark-bootc):
# - Python 3.14.4 (Fedora 43 rawhide)
# - Julia 1.12.6
# - R 4.5.3
# All languages must match for fair benchmark comparisons.
#
# https://mise.jdx.dev

min_version = "2024.1.0"

# =============================================================================
# TOOL VERSIONS - Must match bootc OS for fair benchmarks
# =============================================================================
[tools]
# Python 3.14.4 - managed by mise (uses uv backend)
python = "3.14.4"

# Julia 1.12.6 - managed by mise (asdf backend)
julia = "1.12.6"

# R 4.5.3 - managed by mise (asdf backend)
# Note: R plugin from mise-plugins/mise-r
r = "4.5.3"

node = "20.11.0"

# =============================================================================
# PLUGIN CONFIGURATION - Explicit backend declarations
# =============================================================================
[plugins]
# Julia plugin for asdf
julia = "https://github.com/mise-plugins/mise-julia"

# R plugin for asdf
r = "https://github.com/mise-plugins/mise-r"

# =============================================================================
# ENVIRONMENT VARIABLES
# =============================================================================
[env]
# Use fast Python installer
UV_PYTHON_INSTALL_MIRROR = "https://github.com/indygreg/python-build-standalone/releases/download"

# Julia configuration
JULIA_DEPOT_PATH = "{{config_root}}/.julia:{{env.HOME}}/.julia"
JULIA_PROJECT = "{{config_root}}"

# R configuration
R_LIBS_USER = "{{config_root}}/.r-libs"
R_LIBS_SITE = ""
R_PROFILE_USER = "/dev/null"

# Benchmark configuration
BENCHMARK_RUNS = "30"
BENCHMARK_THREADS = "8"

# Thread configuration for fair benchmarking
# All languages should use same number of threads for BLAS operations
JULIA_NUM_THREADS = "8"
OPENBLAS_NUM_THREADS = "8"
OMP_NUM_THREADS = "8"

# Reproducibility
REPRODUCIBILITY_SEED = "42"

[settings]
# Auto-confirm plugin/tool installations
yes = true

# =============================================================================
# TASKS: Installation
# =============================================================================
[tasks.install]
description = "Install all language tools and dependencies"
run = """
echo "=============================================="
echo "Installing mise plugins..."
echo "=============================================="
mise plugin install julia https://github.com/mise-plugins/mise-julia || true
mise plugin install r https://github.com/mise-plugins/mise-r || true

echo ""
echo "=============================================="
echo "Installing language versions..."
echo "=============================================="
mise install

echo ""
echo "=============================================="
echo "Installing Python packages..."
echo "=============================================="
source .venv/bin/activate
uv pip install numpy scipy pandas matplotlib rasterio geopandas scikit-learn psutil tqdm seaborn shapely pyproj fiona h5py rioxarray xarray json3

echo ""
echo "=============================================="
echo "Installing Julia packages..."
echo "=============================================="
julia -e 'using Pkg
Pkg.add(["BenchmarkTools", "CSV", "DataFrames", "SHA", "MAT", "ArchGDAL", "GeoDataFrames", "LibGEOS", "NearestNeighbors", "Shapefile", "JSON3"])
Pkg.precompile()'

echo ""
echo "=============================================="
echo "Installation Complete"
echo "=============================================="
echo "Python: $(python --version)"
echo "Julia: $(julia --version 2>/dev/null | head -1 || echo 'not found')"
echo "R: $(R --version 2>/dev/null | head -1 || echo 'not found')"
"""

[tasks.install-python-313]
description = "Install Python 3.13 (REQUIRED for fair comparison)"
run = """
echo "=============================================="
echo "Installing Python 3.13..."
echo "=============================================="
echo ""
echo "IMPORTANT: Python 3.13 is REQUIRED because:"
echo "  - Container uses Python 3.13 from Debian Bookworm"
echo "  - Python 3.13 has different optimizations than 3.12"
echo "  - Using 3.12 would invalidate benchmark comparisons"
echo ""

# Install Python 3.13 if not already installed
uv python install 3.13.12

# Create virtual environment with Python 3.13
rm -rf .venv
uv venv .venv --python 3.13.12

echo ""
echo "Python 3.13 installed. Activate with:"
echo "  source .venv/bin/activate"
"""

[tasks.install-julia]
description = "Install Julia packages only"
run = """
julia -e 'using Pkg
Pkg.add(["BenchmarkTools", "CSV", "DataFrames", "SHA", "MAT", "ArchGDAL", "GeoDataFrames", "LibGEOS", "NearestNeighbors", "Shapefile", "JSON3"])
Pkg.precompile()'
"""

[tasks.install-r]
description = "Install R 4.5.3 via mise"
run = """
echo "=============================================="
echo "Installing R 4.5.3 via mise..."
echo "=============================================="
echo ""
echo "IMPORTANT: R must be version 4.5.3 to match container!"

mise plugin install r https://github.com/mise-plugins/mise-r || true
mise install r@4.5.3

echo ""
echo "=============================================="
echo "R 4.5.3 installed!"
echo "=============================================="
mise exec r@4.5.3 -- R --version | head -1
"""

# =============================================================================
# TASKS: Data
# =============================================================================
[tasks.download-data]
description = "Download/generate benchmark datasets"
run = """
mkdir -p data
python tools/download_data.py --all --synthetic
echo "✓ All datasets ready"
"""

[tasks.setup]
description = "Complete setup (install + download data)"
depends = ["install", "download-data"]

# =============================================================================
# TASKS: Benchmarks
# =============================================================================
[tasks.bench]
description = "Run all benchmarks (native execution)"
run = """
export JULIA_NUM_THREADS=8
export OPENBLAS_NUM_THREADS=8
export OMP_NUM_THREADS=8

mkdir -p results validation

echo ""
echo "=============================================="
echo "RUNNING ALL BENCHMARKS"
echo "=============================================="
echo "Python: $(python --version)"
echo "Julia: $(julia --version 2>/dev/null | head -1)"
echo "R: $(R --version 2>/dev/null | head -1)"
echo "BLAS: $(R --version 2>/dev/null | grep -i blas || echo 'OpenBLAS')"
echo ""
echo "Thread config: JULIA_NUM_THREADS=$JULIA_NUM_THREADS, OPENBLAS_NUM_THREADS=$OPENBLAS_NUM_THREADS"
echo ""
echo "For container execution (recommended for thesis):"
echo "  ./run_benchmarks.sh"
echo "=============================================="
echo ""

echo "[1/9] Matrix operations..."
python benchmarks/matrix_ops.py
JULIA_NUM_THREADS=$JULIA_NUM_THREADS ~/.juliaup/bin/julialauncher benchmarks/matrix_ops.jl
OPENBLAS_NUM_THREADS=$OPENBLAS_NUM_THREADS Rscript benchmarks/matrix_ops.R

echo "[2/9] I/O operations..."
python benchmarks/io_ops.py
~/.juliaup/bin/julialauncher benchmarks/io_ops.jl
Rscript benchmarks/io_ops.R

echo "[3/9] Hyperspectral (Cuprite SAM)..."
python benchmarks/hsi_stream.py
~/.juliaup/bin/julialauncher benchmarks/hsi_stream.jl
Rscript benchmarks/hsi_stream.R

echo "[4/9] Vector benchmarks (Point-in-Polygon)..."
python benchmarks/vector_pip.py
~/.juliaup/bin/julialauncher benchmarks/vector_pip.jl
Rscript benchmarks/vector_pip.R

echo "[5/9] Interpolation (IDW)..."
python benchmarks/interpolation_idw.py
~/.juliaup/bin/julialauncher benchmarks/interpolation_idw.jl
Rscript benchmarks/interpolation_idw.R

echo "[6/9] Time-series NDVI..."
python benchmarks/timeseries_ndvi.py
~/.juliaup/bin/julialauncher benchmarks/timeseries_ndvi.jl
Rscript benchmarks/timeseries_ndvi.R

echo "[7/9] Raster Algebra (Band Math, NDVI)..."
python benchmarks/raster_algebra.py
~/.juliaup/bin/julialauncher benchmarks/raster_algebra.jl
Rscript benchmarks/raster_algebra.R

echo "[8/9] Zonal Statistics..."
python benchmarks/zonal_stats.py
~/.juliaup/bin/julialauncher benchmarks/zonal_stats.jl
Rscript benchmarks/zonal_stats.R

echo "[9/9] Coordinate Reprojection..."
python benchmarks/reprojection.py
~/.juliaup/bin/julialauncher benchmarks/reprojection.jl
Rscript benchmarks/reprojection.R

echo ""
echo "=============================================="
echo "Generating visualizations..."
echo "=============================================="
python tools/thesis_viz.py --all

echo ""
echo "✓ All benchmarks complete!"
echo "Results: results/*.json"
echo "Figures: results/figures/"
"""

[tasks.bench-python]
description = "Run Python benchmarks only"
run = """
mkdir -p results validation
source .venv/bin/activate
python benchmarks/matrix_ops.py
python benchmarks/io_ops.py
python benchmarks/hsi_stream.py
python benchmarks/vector_pip.py
python benchmarks/interpolation_idw.py
python benchmarks/timeseries_ndvi.py
python benchmarks/raster_algebra.py
python benchmarks/zonal_stats.py
python benchmarks/reprojection.py
"""

[tasks.bench-julia]
description = "Run Julia benchmarks only"
run = """
export JULIA_NUM_THREADS=8
mkdir -p results validation
JULIA_NUM_THREADS=$JULIA_NUM_THREADS ~/.juliaup/bin/julialauncher benchmarks/matrix_ops.jl
~/.juliaup/bin/julialauncher benchmarks/io_ops.jl
~/.juliaup/bin/julialauncher benchmarks/hsi_stream.jl
~/.juliaup/bin/julialauncher benchmarks/interpolation_idw.jl
~/.juliaup/bin/julialauncher benchmarks/timeseries_ndvi.jl
~/.juliaup/bin/julialauncher benchmarks/raster_algebra.jl
~/.juliaup/bin/julialauncher benchmarks/zonal_stats.jl
~/.juliaup/bin/julialauncher benchmarks/reprojection.jl
"""

[tasks.bench-r]
description = "Run R benchmarks only"
run = """
export OPENBLAS_NUM_THREADS=8
mkdir -p results validation
OPENBLAS_NUM_THREADS=$OPENBLAS_NUM_THREADS Rscript benchmarks/matrix_ops.R
Rscript benchmarks/io_ops.R
Rscript benchmarks/hsi_stream.R
Rscript benchmarks/vector_pip.R
Rscript benchmarks/interpolation_idw.R
Rscript benchmarks/timeseries_ndvi.R
Rscript benchmarks/raster_algebra.R
Rscript benchmarks/zonal_stats.R
Rscript benchmarks/reprojection.R
"""

# =============================================================================
# TASKS: Validation & Visualization
# =============================================================================
[tasks.validate]
description = "Run cross-language validation (unified)"
run = """
python validation/thesis_validation.py --all
"""

[tasks.viz]
description = "Generate all visualizations (unified)"
run = """
python tools/thesis_viz.py --all
echo "✓ Visualizations in results/figures/"
"""

[tasks.report]
description = "Generate validation report (unified)"
run = """
mkdir -p results validation
python validation/thesis_validation.py --all
echo "✓ Report: results/thesis_validation_report.md"
"""

# =============================================================================
# TASKS: Utilities
# =============================================================================
[tasks.clean]
description = "Clean generated files"
run = """
rm -rf results/*.json
rm -rf __pycache__
rm -rf benchmarks/__pycache__
rm -rf tools/__pycache__
find . -name "*.pyc" -delete
find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
echo "✓ Cleaned"
"""

[tasks.info]
description = "Show environment and version information"
run = """
echo "=============================================="
echo "Environment Information"
echo "=============================================="
echo ""
echo "Native Execution (this machine):"
echo "  System: $(uname -s) $(uname -r)"
echo "  Python: $(python --version)"
echo "  Julia: $(julia --version 2>/dev/null | head -1 || echo 'not found')"
echo "  R: $(R --version 2>/dev/null | head -1 || echo 'not found')"
echo ""
echo "Container Versions (for reference):"
echo "  Python: 3.13.12 (Debian Bookworm)"
echo "  Julia:  1.11.9 (Debian Bookworm)"
echo "  R:      4.5.3 (Debian)"
echo ""
echo "Managed by mise with explicit backends:"
echo "  - python: mise (uv backend)"
echo "  - julia:  mise (asdf backend)"
echo "  - r:      mise (asdf backend)"
echo ""
if [ -f .venv/bin/activate ]; then
    echo "Python packages:"
    python -c "import numpy, scipy, pandas, matplotlib, rasterio, geopandas; print(f'  numpy={numpy.__version__}, scipy={scipy.__version__}, pandas={pandas.__version__}'); print(f'  matplotlib={matplotlib.__version__}, rasterio={rasterio.__version__}, geopandas={geopandas.__version__}')"
fi
"""

[tasks.check]
description = "Verify environment setup"
run = """
echo "Checking environment..."
python --version && python -c "import numpy; print('NumPy:', numpy.__version__)"
julia --version 2>/dev/null && echo "Julia OK" || echo "Julia not found"
R --version 2>/dev/null | head -1 && echo "R OK" || echo "R not found"
"""

[tasks.scaling]
description = "Run data scaling benchmarks"
run = """
mkdir -p results/scaling
python benchmark_scaling.py --quick --runs 3
echo "✓ Quick scaling complete. For full benchmarks: python benchmark_scaling.py"
"""

[tasks.scaling-full]
description = "Run full data scaling benchmarks (slow)"
run = """
mkdir -p results/scaling
python benchmark_scaling.py --runs 10
python visualize_scaling.py
"""

[tasks.viz-scaling]
description = "Visualize scaling results"
run = """
python visualize_scaling.py
echo "✓ Scaling plots in results/scaling/"
"""

[tasks.versions]
description = "List all installed tool versions"
run = """
echo "=============================================="
echo "Installed Tool Versions"
echo "=============================================="
mise list
"""

# Task aliases
[tasks]
b = "bench"
s = "setup"
c = "clean"
i = "info"
v = "validate"
